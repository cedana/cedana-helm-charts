nameOverride: cedana
fullnameOverride: cedana

# Install the following CRDs before setting installKueue as true
# kubectl apply --server-side -f https://github.com/kubernetes-sigs/kueue/releases/download/v0.10.1/manifests.yaml
installKueue: false

config:
  authToken:
  url:
  clusterId:
  sqsQueueUrl:

  # Specify the address and port to bind the daemon on
  #
  # Address has to be 0.0.0.0 for the service to be externally addressable,
  # if you don't want it to be feel free to update, it ideally won't affect stability
  #
  # Default: 0.0.0.0:8080
  address: 0.0.0.0:8080
  # Specify the protocol to use for daemon service
  # Default: tcp (other protocols might not be supported properly, update with caution)
  # Options:
  # - tcp: TCP socket
  # - unix: Unix Socket
  # - vsock: VSock for VM and hypervisor communication, useful for supporting VM based migrations
  protocol: tcp

  # Specify path to directory for storing checkpoints.
  # - `cedana://<path>` for Cedana-managed global storage (recommended)
  # - `s3://<bucket>/<path>` for your S3 storage
  # - `<path>` for node-local storage (not recommended, as it won't be accessible across nodes)
  checkpointDir: /tmp
  # Specify the number of parallel streams to use for streaming checkpoint/restore operations.
  # 0 means no streaming. n > 0 means n parallel streams (or number of pipes) to use.
  # Streaming ensures a low footprint by using memory efficiently with no intermediate
  # disk space required, although performance may be slightly better or worse depending on disk and network read/write speeds.
  checkpointStreams: 0
  # Specify the maximum memory (RAM) allowed for checkpoint streaming.
  checkpointStreamMemoryLimit: 4096 # 4 GiB
  checkpointCompression: none # Options: "none", "tar", "lz4", "gzip", "zlib"
  # Specify whether to perform checkpoint compression/upload async. Recommended if anticipating large checkpoints,
  # which could take too long to stream directly to a bucket. Note that restore will only be possible after upload is complete,
  # so there might be a delay before a workload can be restored even though the checkpoint shows as complete.
  checkpointAsync: false

  gpuPoolSize: 0 # Number of GPU controllers to keep warm. Improves GPU workload startup/restore time but uses more memory.
  gpuShmSize: "8589934592" # 8 GiB. Enough for most workloads. Reduce if memory constrained or running small workloads only.

  # Specify the plugin versions to use. If pluginsBuilds is "release", then any release version
  # for the plugins can be specified. If pluginsBuilds is "alpha", then specify the branch name.
  pluginsBuilds: release
  pluginsCriuVersion: v4.2-cedana.01
  pluginsContainerdRuntimeVersion: v0.7.5
  pluginsGpuVersion: v0.7.3
  pluginsStreamerVersion: v0.1.0

  profiling: true
  metrics: true
  logLevel: info

  awsAccessKeyId: # AWS access key ID if using S3 storage (if `s3://<bucket>/<path>` in checkpointDir)
  awsSecretAccessKey: # AWS secret access key if using S3 storage
  awsRegion: # AWS region if using S3 storage (uses default region if not set)
  awsEndpoint: # AWS endpoint if using S3-compatible storage

  criuLogLevel: 2
  # Uncomment, to use custom pre-existing secret
  # preExistingSecret: cedana-secret-user

hostConfig:
  containerdAddress: /run/containerd/containerd.sock # Path to containerd socket
  # Cedana does not support io-uring based checkpoint restores
  # Set ioUring to false to disable linux kernel's io-uring option
  disableIoUring: true
  # Optional configuration to increase /dev/shm size on nodes
  # This is useful for workloads that require large shared memory
  shmConfig:
    enabled: false # Set to true to enable /dev/shm size increase
    size: 10G # Size to set for /dev/shm (e.g., "10G", "20G")
    minSize: 10G # Minimum size to trigger remount (e.g., "10G", "20G")

daemonHelper:
  service:
    annotations: {}
  image:
    repository: cedana/cedana-helper
    tag: v0.9.297
    digest: # ignores tag if set
    imagePullPolicy: IfNotPresent
  updateStrategy:
    maxSurge: 0
    maxUnavailable: 99999
  tolerations:
    # Allow scheduling on nodes that are waiting for Cedana to be ready
    - key: "cedana.ai/not-ready"
      operator: "Exists"
      effect: "NoSchedule"
  affinity: {}
  # Restrict Cedana to a specific set of nodes.
  #
  # Label the nodes you want Cedana to run on:
  #   kubectl label nodes <node-name> cedana.ai/enabled=true
  # then set the matching selector below (e.g. via --set or a values override):
  #   nodeSelector:
  #     cedana.ai/enabled: "true"
  #
  # The controller reads this same nodeSelector to decide which nodes to manage,
  # so it will only apply the cedana.ai/not-ready taint to in-scope nodes. Nodes
  # outside the selector are left untouched (no permanent not-ready taint). Leave
  # empty to run on all nodes (default).
  nodeSelector: {}

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: cedana-controller-manager

controllerManager:
  # Whether the controller manages the cedana.ai/not-ready taint on nodes.
  #
  # When true (default), the controller taints a node cedana.ai/not-ready:NoSchedule
  # while Cedana is starting up on it, and removes the taint once Cedana is ready.
  # This gates other workloads off a node until it can actually checkpoint/restore.
  #
  # Set to false if you manage node readiness / taints yourself (e.g. via your own
  # tooling, GitOps, or an admission controller). When false, the controller will
  # neither add nor remove the cedana.ai/not-ready taint — it stays entirely hands-off,
  # and you are responsible for keeping workloads off nodes until Cedana is ready.
  #
  # Note: the built-in cedana.ai/not-ready toleration on the Cedana pods is harmless
  # to leave in place either way.
  taintNodes: true
  autoscaling:
    enabled: false
    replicaCount: 1
    deploymentRevisionHistoryLimit: 10
  service:
    annotations: {}
    ports:
      - protocol: TCP
        port: 1324
        targetPort: 1324
  manager:
    podAnnotations: {}
    args:
      - --health-probe-bind-address=:8081
      - --metrics-bind-address=127.0.0.1:8080
      - --leader-elect
    containerSecurityContext:
      # controller doesn't require any privileges
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    image:
      repository: cedana/cedana-controller
      tag: v0.6.5
      digest: # ignores tag if set
      imagePullPolicy: IfNotPresent
    resources:
      # empty to ensure minimal resource
      # usage on demo/test deployments
      # uncomment or add custom resource
      # limits:
      #   cpu: 500m
      #   memory: 128Mi
      # requests:
      #   cpu: 10m
      #   memory: 64Mi
  rbac:
    resources:
      # empty to ensure minimal resource
      # usage on demo/test deployments
      # uncomment or add custom resource
      # limits:
      #   cpu: 500m
      #   memory: 128Mi
      # requests:
      #   cpu: 10m
      #   memory: 64Mi
  tolerations:
    # Allow scheduling on nodes that are waiting for Cedana to be ready
    - key: "cedana.ai/not-ready"
      operator: "Exists"
      effect: "NoSchedule"
    # Run the command below to deploy the controller on a dedicated node
    # This will not allow shceduling of new pods on the node running the controller pod
    # kubectl taint node <node-name> dedicated=cedana-manager:NoSchedule
    # - key: "dedicated"
    #   operator: "Equal"
    #   value: "cedana-manager"
    #   effect: "NoSchedule"
  affinity:
    # Allow scheduling of controller pod on the labeled node only
    # kubectl label nodes <node-name> dedicated=cedana-manager
    # nodeAffinity:
    #   requiredDuringSchedulingIgnoredDuringExecution:
    #     nodeSelectorTerms:
    #       - matchExpressions:
    #           - key: "dedicated"
    #             operator: "In"
    #             values:
    #               - "cedana-manager"
  nodeSelector: {}

# dynamo-watcher: standalone component that watches DynamoGraphDeployments and
# dynamo Services, syncs their status to the Cedana propagator, and consumes the
# cluster's RabbitMQ create/delete workload queues. Only relevant on clusters that
# have NVIDIA Dynamo installed, so it is opt-in (disabled by default).
dynamoWatcher:
  enabled: false
  # Create a LoadBalancer Service for dynamo frontends (sets CEDANA_DYNAMO_CREATE_LB).
  createLoadBalancer: false
  replicaCount: 1
  podAnnotations: {}
  image:
    repository: cedana/cedana-dynamo-watcher
    # Keep in lockstep with controllerManager.manager.image.tag (same repo release).
    tag: v0.6.4
    digest: # ignores tag if set
    imagePullPolicy: IfNotPresent
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  resources: {}
  nodeSelector: {}
  tolerations:
    # Allow scheduling on nodes that are waiting for Cedana to be ready
    - key: "cedana.ai/not-ready"
      operator: "Exists"
      effect: "NoSchedule"
  affinity: {}

kubernetesClusterDomain: cluster.local

metricsService:
  ports:
    - name: https
      port: 8443
      protocol: TCP
      targetPort: https
  type: ClusterIP
